services:
  mysql:
    image: mysql:8.4
    container_name: tanyourpeach-db
    restart: unless-stopped
    ports:
      - "33306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-tanyourpeach}
      MYSQL_USER: ${DB_USERNAME:-springboot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-testpass}
      MYSQL_TEST_DATABASE: ${TEST_DB_NAME:-tanyourpeach_test}
    volumes:
      - tanyourpeach-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -u root --password="$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  tanyourpeach-mysql-data:  